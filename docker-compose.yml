version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: agri-trace-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: agri_trace
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: agri-trace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # IPFS 节点（可选，Mock模式下不需要）
  ipfs:
    image: ipfs/kubo:latest
    container_name: agri-trace-ipfs
    restart: unless-stopped
    ports:
      - "4001:4001"   # P2P
      - "5001:5001"   # API
      - "8090:8080"   # Gateway
    volumes:
      - ipfs_data:/data/ipfs
    profiles:
      - full  # 仅在 --profile full 时启动

  # Go 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agri-trace-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
    volumes:
      - ./backend/config/config.yaml:/app/config/config.yaml
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # Vue3 前端（Nginx 静态服务）
  frontend:
    image: nginx:alpine
    container_name: agri-trace-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  ipfs_data:
